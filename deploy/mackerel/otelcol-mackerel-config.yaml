# otelcol-mackerel（MDOT Collector）のログ収集パイプライン定義。
# VPS 上の /etc/otelcol-mackerel/config.yaml にコピーして使う
# （docs/plans/006_デプロイ・運用.md のセットアップ手順を参照）。
#
# MACKEREL_APIKEY 等の秘匿情報はここには書かない
# （/etc/otelcol-mackerel/otelcol-mackerel.conf 側で管理する）。
#

receivers:
  journald:
    # yomikiri-batch.service のログのみに限定する（コスト事故防止の要）。
    # 誤って外すと sshd / docker / mackerel-agent 自身等 VPS 全体の journal を
    # 取り込んでしまい、無料枠（月1GB）を容易に超過し得る。
    units:
      - yomikiri-batch.service
    start_at: end # 導入時点までの過去ログを一括取り込みしない

processors:
  # Mackerel はログを service.name（+ service.namespace）リソース属性で識別するため、
  # journald レシーバーが自動設定しない service.name をここで明示的に付与する。
  # 未設定のままだと Mackerel 側の「サービス名」表示が unknown_service になる。
  resource:
    attributes:
      - key: service.name
        value: "yomikiri-batch"
        action: upsert
  # journald レシーバーは body を文字列ではなく構造化された Map として渡してくる
  # （MESSAGE/PRIORITY/_SYSTEMD_UNIT 等がキーになったマップ）。まず body["MESSAGE"] を
  # 取り出して body を文字列に差し替える。apps/batch/src/logger.ts が出力する行では
  # この MESSAGE の中身がそのまま1回JSONエンコードされた文字列になっているため、
  # それを ParseJSON して level/message 等を取り出す。level を severity_text /
  # severity_number にも反映させる（未設定だと Mackerel 側のログレベル表示が
  # UNSPECIFIED のままになる）。apps/batch/src/logger.ts が出力するレベルは
  # info/warn/error の3種類のみ。
  # systemd 自身が出すユニットのライフサイクルメッセージ（JSONでない）は
  # ParseJSON 側の条件が false になり body がプレーンテキストのまま残るだけで、
  # パイプライン自体は止まらない（error_mode: ignore）。
  transform:
    error_mode: ignore # JSON以外の行が来てもパイプラインを止めない
    log_statements:
      - context: log
        statements:
          - 'set(body, body["MESSAGE"]) where IsMap(body) and body["MESSAGE"] != nil'
          - 'merge_maps(attributes, ParseJSON(body), "upsert") where IsString(body) and IsMatch(body, "^\\{")'
          - 'set(severity_text, attributes["level"]) where attributes["level"] != nil'
          - 'set(severity_number, SEVERITY_NUMBER_INFO) where severity_text == "info"'
          - 'set(severity_number, SEVERITY_NUMBER_WARN) where severity_text == "warn"'
          - 'set(severity_number, SEVERITY_NUMBER_ERROR) where severity_text == "error"'
  batch: {}

exporters:
  mackerel_otlp: {}
  # APIキーは /etc/otelcol-mackerel/otelcol-mackerel.conf の
  # MACKEREL_APIKEY 環境変数から exporter が読む。

service:
  pipelines:
    logs:
      receivers: [journald]
      processors: [resource, transform, batch]
      exporters: [mackerel_otlp]
