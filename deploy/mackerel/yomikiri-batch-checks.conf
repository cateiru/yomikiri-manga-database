# mackerel-agent は conf.d/*.conf から [plugin.checks.*] を読み込まないため、
# このファイルの内容は /etc/mackerel-agent/mackerel-agent.conf の末尾に
# 直接追記して使う（conf.d への配置では動作しない）。
# check-file-age は mackerel-check-plugins に含まれるプラグイン。別途インストールし、
# 実際のインストール先に応じて command のパスを調整すること。

# last-success（yomikiri-batch.service 成功時に touch されるファイル）の鮮度を監視する。
# 実行は毎日 00:05・12:05・18:05（JST）で、最大間隔は 12 時間（18:05→翌 00:05）。
# 13 時間（46800 秒）で警告、16 時間（57600 秒）でクリティカルとし、
# 「実行漏れ・ハング」を検知する。
[plugin.checks.yomikiri-batch-freshness]
command = ["check-file-age", "-f", "/var/lib/yomikiri/last-success", "-w", "46800", "-c", "57600"]
notification_interval = 60

# yomikiri-batch.service の直近の実行が失敗（exit code 非 0）していないかを即時に監視する。
[plugin.checks.yomikiri-batch-service]
command = ["/bin/sh", "-c", "systemctl is-failed --quiet yomikiri-batch.service && exit 2 || exit 0"]
notification_interval = 60
